name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build React App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Ensure data directory exists
        run: |
          mkdir -p frontend/public/data
          # Create empty placeholder files if they don't exist
          [ -f frontend/public/data/swagger.json ] || echo '{"openapi":"3.0.0","info":{"title":"QA Framework","version":"1.0.0"},"paths":{}}' > frontend/public/data/swagger.json
          [ -f frontend/public/data/latest.json ]  || echo '{"message":"No results yet"}' > frontend/public/data/latest.json
          [ -f frontend/public/data/history.json ] || echo '[]' > frontend/public/data/history.json

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_API_URL: /api

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
